<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Position Example</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
}

h2{
    margin:20px;
}

.container{
    position:relative;
    height:250px;
    border:2px solid black;
    margin:20px;
    padding:20px;
}

.box{
    height:100px;
    width:100px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:black;
    font-weight:bold;
}

.relative{
    background-color:aquamarine;
    position:relative;
    top:30px;
    left:20px;
}

.absolute{
    background-color:rgb(211,137,185);
    position:absolute;
    top:20px;
    right:20px;
}

.fixed{
    background-color:rgb(146,50,214);
    position:fixed;
    bottom:20px;
    right:20px;
    color:white;
}

.sticky{
    background-color:yellow;
    position:sticky;
    top:0;
    width: 50px;
    height:50px;
}

.spacer{
    height:100vh;
    padding:20px;
}
</style>
</head>

<body>

<h2>CSS Position Examples</h2>

<div class="box sticky">Sticky</div>

<div class="container">
    <div class="box relative">Relative</div>
    <div class="box absolute">Absolute</div>
</div>

<div class="box fixed">Fixed</div>

<div class="spacer">
    Scroll down to see the <b>Sticky</b> and <b>Fixed</b> behavior.
</div>

</body>
</html>
